name: Bug report
description: Report a UI, runtime integration, or documentation bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run opencode serve
        2. Run npm run dev
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.12.2"
  - type: input
    id: opencode
    attributes:
      label: OpenCode version
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: "Chrome 124, Safari 17, etc."
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
